    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Noto+Sans+SC:wght@100;400;700&display=swap');
        :root { --neon: #c1ff72; }
        
        * { cursor: none !important; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        /* 移动端恢复默认光标并隐藏自定义光标 */
        @media (max-width: 768px) {
            * { cursor: auto !important; }
            #cursor { display: none; }
        }

        html, body { background: #000; margin: 0; padding: 0; overflow-x: hidden; font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; scroll-behavior: smooth; }
        
        header { position: fixed; top: 0; width: 100%; padding: 30px 40px; z-index: 10000; pointer-events: none; }
        @media (min-width: 768px) { header { padding: 40px 60px; } }
        .logo-btn { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.2em; color: var(--neon); text-decoration: none; pointer-events: auto; }

        /* 地图容器 */
        #section-map { position: relative; width: 100vw; height: 100vh; background: #050505; z-index: 1; overflow: hidden; }
        #map { width: 100%; height: 100%; }

        /* 面板响应式定位 */
        .glass-panel {
            position: absolute;
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.9) 0%, rgba(5, 5, 5, 0.8) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* PC端：右侧排列 */
        @media (min-width: 768px) {
            #persistent-progress { top: 60px; right: 60px; width: 280px; z-index: 100; }
            #filter-floating { top: 280px; right: 60px; width: 280px; z-index: 99; }
        }

        /* 手机端：底部堆叠 */
        @media (max-width: 767px) {
            #persistent-progress { top: auto; bottom: 170px; left: 15px; right: 15px; width: auto !important; padding: 15px; }
            #filter-floating { top: auto; bottom: 15px; left: 15px; right: 15px; width: auto !important; padding: 15px; }
            #persistent-progress .text-7xl { font-size: 3.5rem; }
            #persistent-progress .text-4xl { font-size: 1.5rem; }
        }

        /* 弹窗与交互 */
        .mapboxgl-popup-content { background: rgba(15, 15, 15, 0.95) !important; backdrop-filter: blur(8px); border: 1px solid var(--neon); color: white; padding: 12px !important; border-radius: 0 !important; }
        .range-slider { position: relative; width: 100%; height: 20px; margin-top: 10px; }
        .range-slider input[type="range"] { position: absolute; left: 0; width: 100%; pointer-events: none; -webkit-appearance: none; background: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 8px; height: 16px; background: var(--neon); cursor: pointer; pointer-events: auto; }
        .slider-track { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; height: 1px; background: rgba(255,255,255,0.1); z-index: 1; }

        /* 地图标记样式 */
        .route-marker { pointer-events: auto !important; }
        .route-marker .dot { width: 4px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .route-name { margin-top: 6px; font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
        .route-marker.highlight .dot { width: 7px; height: 7px; background: var(--neon); box-shadow: 0 0 12px var(--neon); }
        .route-marker.highlight .route-name { color: var(--neon); opacity: 1; font-weight: 700; }
        .route-marker.dimmed { opacity: 0.05; filter: blur(2px); pointer-events: none; }

        /* 产品页响应式 */
        #section-product { position: relative; min-height: 100vh; background: #0a0a0a; padding: 80px 20px; z-index: 10; border-top: 1px solid rgba(193, 255, 114, 0.1); }
        @media (min-width: 768px) { #section-product { padding: 120px 60px; } }
        
        .product-img {
            opacity: 0.2;
            filter: grayscale(100%);
            transition: opacity 0.05s linear, filter 0.05s linear;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        @media (max-width: 768px) {
            .product-img { opacity: 0.7; filter: grayscale(30%); } /* 手机端默认半亮，方便滑动观看 */
        }
        .product-img:hover { opacity: 1 !important; filter: grayscale(0%) !important; transition: none !important; }
        .img-container { background: #000; overflow: hidden; position: relative; border: none; }

        #cursor { position: fixed; top: 0; left: 0; width: 6px; height: 6px; background: var(--neon); border-radius: 50%; pointer-events: none; z-index: 20000; box-shadow: 0 0 10px var(--neon); transform: translate(-50%, -50%); }
        #scroll-down { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100; color: var(--neon); animation: bounce 2s infinite; pointer-events: auto; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {bottom: 40px;} 40% {bottom: 55px;} }
    </style>
</head>

        const mStart = document.getElementById('f-month-start');
        const mEnd = document.getElementById('f-month-end');
        const monthVal = document.getElementById('month-val');

        function updateMonths() {
            let v1 = parseInt(mStart.value), v2 = parseInt(mEnd.value);
            monthVal.innerText = `${Math.min(v1, v2)} - ${Math.max(v1, v2)}月`;
            updateView();
        }

        function updateView() {
            const isExp = document.getElementById('master-switch').checked;
            const lenLimit = parseInt(document.getElementById('f-len').value);
            const rMin = Math.min(parseInt(mStart.value), parseInt(mEnd.value)), rMax = Math.max(parseInt(mStart.value), parseInt(mEnd.value));
            document.getElementById('len-val').innerText = lenLimit;

            markers.forEach(m => {
                m.el.classList.remove('highlight', 'dimmed');
                const lenOk = m.len <= lenLimit;
                const mOk = (m.month[0] <= rMax && m.month[1] >= rMin);
                if (!isExp) {
                    if (highlights.includes(m.name)) m.el.classList.add('highlight'); else m.el.classList.add('dimmed');
                } else {
                    if (lenOk && mOk) m.el.classList.add('highlight'); else m.el.classList.add('dimmed');
                }
            });
            const current = highlights.length;
            document.getElementById('product-count').innerText = current < 10 ? `0${current}` : current;
            document.getElementById('progress-bar').style.width = `${(current / 100) * 100}%`;
        }

        map.on('load', () => {
            routes.forEach(r => {
                const el = document.createElement('div');
                el.className = 'route-marker';
                el.innerHTML = `<div class="dot"></div><div class="route-name">${r.name}</div>`;
                
                // 点击地图标记跳转到产品页对应卡片
                el.addEventListener('click', () => {
                    const targetCard = document.getElementById(`product-card-${r.id}`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });

                el.addEventListener('mouseenter', () => {
                    if(el.classList.contains('dimmed')) return;
                    popup.setLngLat(r.pos).setHTML(`<div><strong style="color:#c1ff72;font-size:14px">${r.name}</strong><div style="font-size:10px;margin-top:5px;opacity:0.8">长度: ${r.len}KM | 月份: ${r.month[0]}-${r.month[1]}月</div></div>`).addTo(map);
                });
                el.addEventListener('mouseleave', () => popup.remove());
                
                new mapboxgl.Marker(el).setLngLat(r.pos).addTo(map);
                markers.push({ ...r, el });
            });
            renderProducts(); updateView();
        });

        mStart.addEventListener('input', updateMonths);
        mEnd.addEventListener('input', updateMonths);
        document.getElementById('master-switch').addEventListener('input', updateView);
        document.getElementById('f-len').addEventListener('input', updateView);
        
        // 自定义光标跟随
        window.addEventListener('mousemove', e => { 
            const c = document.getElementById('cursor');
            if(c) {
                c.style.left = e.clientX + 'px'; 
                c.style.top = e.clientY + 'px'; 
            }
        });
        
        // 窗口尺寸变更时刷新地图布局
        window.addEventListener('resize', () => {
            map.resize();
        });
    </script>
</body>
</html>
